<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest 3 WebXR Environment</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            overflow: hidden;
        }
        #info {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            z-index: 100;
            pointer-events: none;
        }
        .overlay {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            display: inline-block;
        }
        #exit-button {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            background: rgba(220, 20, 60, 0.8);
            color: white;
            border: 2px solid white;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            z-index: 2000;
            display: none;
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <div id="info">
        <div class="overlay">
            <h1>Quest 3 VR Environment</h1>
            <p>Trigger: Change Color | Grip: Grab & Move</p>
            <p id="status">Loading Three.js...</p>
        </div>
    </div>

    <button id="exit-button">EXIT VR</button>

    <script type="module">
        import * as THREE from 'https://cdnjs.cloudflare.com/ajax/libs/three.js/0.158.0/three.module.min.js';

        let container;
        let camera, scene, renderer;
        let controller1, controller2;
        let raycaster;
        const intersected = [];
        const tempMatrix = new THREE.Matrix4();
        const group = new THREE.Group();

        function init() {
            container = document.createElement('div');
            document.body.appendChild(container);

            scene = new THREE.Scene();

            // --- SKYBOX (Blue Gradient) ---
            const vertexShader = `
                varying vec3 vWorldPosition;
                void main() {
                    vec4 worldPosition = modelMatrix * vec4( position, 1.0 );
                    vWorldPosition = worldPosition.xyz;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4( position, 1.0 );
                }
            `;
            const fragmentShader = `
                uniform vec3 topColor;
                uniform vec3 bottomColor;
                uniform float offset;
                uniform float exponent;
                varying vec3 vWorldPosition;
                void main() {
                    float h = normalize( vWorldPosition + offset ).y;
                    gl_FragColor = vec4( mix( bottomColor, topColor, max( pow( max( h , 0.0), exponent ), 0.0 ) ), 1.0 );
                }
            `;
            const uniforms = {
                topColor: { value: new THREE.Color( 0x0077ff ) },
                bottomColor: { value: new THREE.Color( 0xffffff ) },
                offset: { value: 33 },
                exponent: { value: 0.6 }
            };
            const skyGeo = new THREE.SphereGeometry( 4000, 32, 15 );
            const skyMat = new THREE.ShaderMaterial( { vertexShader, fragmentShader, uniforms, side: THREE.BackSide } );
            scene.add( new THREE.Mesh( skyGeo, skyMat ) );

            // --- GROUND PLANE ---
            const groundGeo = new THREE.PlaneGeometry(200, 200);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            // --- MOUNTAINS (Enhanced Coloring) ---
            for (let i = 0; i < 8; i++) {
                const height = 15 + Math.random() * 15;
                const radius = 8 + Math.random() * 8;
                const mountainGeo = new THREE.ConeGeometry(radius, height, 4);
                const mountainMat = new THREE.MeshStandardMaterial({ color: 0x4d3319 }); // Brown base
                const mountain = new THREE.Mesh(mountainGeo, mountainMat);
                mountain.position.set(-40 + i * 12, height / 2, -60);
                scene.add(mountain);

                // Add Snow Cap
                const capHeight = height * 0.3;
                const capGeo = new THREE.ConeGeometry(radius * 0.3, capHeight, 4);
                const capMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
                const cap = new THREE.Mesh(capGeo, capMat);
                cap.position.set(mountain.position.x, height - (capHeight / 2), mountain.position.z);
                scene.add(cap);
            }

            // --- DISTANT CITY (Left and Right) ---
            function createCity(xPos) {
                const cityGroup = new THREE.Group();
                for (let i = 0; i < 20; i++) {
                    const h = 2 + Math.random() * 10;
                    const w = 1 + Math.random() * 2;
                    const bGeo = new THREE.BoxGeometry(w, h, w);
                    const bMat = new THREE.MeshStandardMaterial({ color: 0x222222 + (Math.random() * 0x333333) });
                    const building = new THREE.Mesh(bGeo, bMat);
                    building.position.set(
                        xPos + (Math.random() - 0.5) * 20,
                        h / 2,
                        (Math.random() - 0.5) * 40
                    );
                    cityGroup.add(building);
                }
                scene.add(cityGroup);
            }
            createCity(-50); // Left city
            createCity(50);  // Right city

            // --- LAKE (Distance behind) ---
            const lakeGeo = new THREE.CircleGeometry(25, 64);
            const lakeMat = new THREE.MeshStandardMaterial({ color: 0x004488, roughness: 0.1, metalness: 0.8 });
            const lake = new THREE.Mesh(lakeGeo, lakeMat);
            lake.rotation.x = -Math.PI / 2;
            lake.position.set(0, 0.02, 50);
            scene.add(lake);

            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 5000);
            camera.position.set(0, 1.6, 3);

            const sceneLight = new THREE.HemisphereLight(0xbcbcbc, 0xa5a5a5, 2);
            scene.add(sceneLight);

            const directLight = new THREE.DirectionalLight(0xffffff, 2);
            directLight.position.set(10, 20, 10);
            scene.add(directLight);

            scene.add(group);

            // --- INTERACTABLE OBJECTS ---
            const geometries = [
                new THREE.BoxGeometry(0.2, 0.2, 0.2),
                new THREE.SphereGeometry(0.15, 32, 32),
                new THREE.CylinderGeometry(0.1, 0.1, 0.3, 32)
            ];

            const colors = [0xff0000, 0x00ff00, 0x0000ff];
            const positions = [
                [-0.5, 1.2, -1],
                [0, 1.2, -1],
                [0.5, 1.2, -1]
            ];

            for (let i = 0; i < 3; i++) {
                const material = new THREE.MeshStandardMaterial({ color: colors[i] });
                const mesh = new THREE.Mesh(geometries[i], material);
                mesh.position.set(...positions[i]);
                mesh.userData.originalColor = colors[i];
                group.add(mesh);
            }

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            
            container.appendChild(renderer.domElement);

            setupXRButton();
            setupExitButton();

            controller1 = renderer.xr.getController(0);
            controller1.addEventListener('selectstart', onSelectStart);
            controller1.addEventListener('squeezestart', onSqueezeStart);
            controller1.addEventListener('squeezeend', onSqueezeEnd);
            scene.add(controller1);

            controller2 = renderer.xr.getController(1);
            controller2.addEventListener('selectstart', onSelectStart);
            controller2.addEventListener('squeezestart', onSqueezeStart);
            controller2.addEventListener('squeezeend', onSqueezeEnd);
            scene.add(controller2);

            const geometry = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 0, -1)]);
            const line = new THREE.Line(geometry);
            line.name = 'line';
            line.scale.z = 5;

            controller1.add(line.clone());
            controller2.add(line.clone());

            raycaster = new THREE.Raycaster();

            window.addEventListener('resize', onWindowResize);
            
            animate();
        }

        function setupXRButton() {
            if ('xr' in navigator) {
                navigator.xr.isSessionSupported('immersive-vr').then((supported) => {
                    if (supported) {
                        const button = document.createElement('button');
                        button.id = 'enter-vr-btn';
                        button.style.position = 'absolute';
                        button.style.bottom = '20px';
                        button.style.left = 'calc(50% - 75px)';
                        button.style.width = '150px';
                        button.style.padding = '12px 6px';
                        button.style.border = '1px solid #fff';
                        button.style.borderRadius = '4px';
                        button.style.background = 'rgba(0,0,0,0.5)';
                        button.style.color = '#fff';
                        button.style.cursor = 'pointer';
                        button.textContent = 'ENTER VR';
                        
                        button.onclick = () => {
                            const sessionInit = {
                                requiredFeatures: ['local-floor'],
                                optionalFeatures: ['hand-tracking', 'dom-overlay'],
                                domOverlay: { root: document.body } // CRITICAL for Exit button visibility in VR
                            };
                            navigator.xr.requestSession('immersive-vr', sessionInit).then(onSessionStarted);
                        };
                        document.body.appendChild(button);
                        document.getElementById('status').textContent = 'Ready for VR';
                    }
                });
            }
        }

        function setupExitButton() {
            const exitBtn = document.getElementById('exit-button');
            exitBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                const session = renderer.xr.getSession();
                if (session) {
                    session.end();
                }
            });
        }

        function onSessionStarted(session) {
            renderer.xr.setSession(session);
            document.getElementById('status').textContent = 'VR Session Started';
            document.getElementById('exit-button').style.display = 'block';
            
            const enterBtn = document.getElementById('enter-vr-btn');
            if (enterBtn) enterBtn.style.display = 'none';

            session.addEventListener('end', () => {
                document.getElementById('exit-button').style.display = 'none';
                if (document.getElementById('enter-vr-btn')) {
                    document.getElementById('enter-vr-btn').style.display = 'block';
                }
                document.getElementById('status').textContent = 'Ready for VR';
            });
        }

        function onSelectStart(event) {
            const controller = event.target;
            const intersections = getIntersections(controller);
            if (intersections.length > 0) {
                const object = intersections[0].object;
                object.material.color.setHex(Math.random() * 0xffffff);
            }
        }

        function onSqueezeStart(event) {
            const controller = event.target;
            const intersections = getIntersections(controller);
            if (intersections.length > 0) {
                const object = intersections[0].object;
                controller.attach(object);
                controller.userData.selected = object;
            }
        }

        function onSqueezeEnd(event) {
            const controller = event.target;
            if (controller.userData.selected !== undefined) {
                const object = controller.userData.selected;
                group.attach(object);
                controller.userData.selected = undefined;
            }
        }

        function getIntersections(controller) {
            tempMatrix.identity().extractRotation(controller.matrixWorld);
            raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
            raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);
            return raycaster.intersectObjects(group.children, false);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            renderer.setAnimationLoop(render);
        }

        function render() {
            cleanIntersected();
            intersectObjects(controller1);
            intersectObjects(controller2);
            renderer.render(scene, camera);
        }

        function intersectObjects(controller) {
            if (controller.userData.selected !== undefined) return;
            const line = controller.getObjectByName('line');
            const intersections = getIntersections(controller);
            if (intersections.length > 0) {
                const intersection = intersections[0];
                const object = intersection.object;
                object.material.emissive.b = 0.5;
                intersected.push(object);
                line.scale.z = intersection.distance;
            } else {
                line.scale.z = 5;
            }
        }

        function cleanIntersected() {
            while (intersected.length) {
                const object = intersected.pop();
                object.material.emissive.b = 0;
            }
        }

        init();
    </script>
</body>
</html>
